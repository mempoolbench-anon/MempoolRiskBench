# LightGBM — single-tx tabular baseline

model:
  name: lightgbm
  family: sklearn
  input_view: tabular
  # 3 separate binary classifiers (revert, MEV, drop)
  max_depth: 8
  n_estimators: 1000
  num_leaves: 63
  learning_rate: 0.05
  min_child_samples: 200
  feature_fraction: 0.9
  bagging_fraction: 0.9
  bagging_freq: 1
  early_stopping_rounds: 50
  use_scale_pos_weight: true  # per-task neg/pos ratio
  # Features: 11 numeric + 3 categorical hash indices (14 total, no embedding)

features:
  numeric:
    - log_gas_price
    - log_gas_tip
    - log_gas_fee
    - log_value
    - log_gas
    - log_nonce
    - log_data_size
    - timestamp_delta_s
    - sender_tx_count
    - sender_avg_gas
    - mempool_pressure
  categorical:
    - from_addr_hash
    - to_addr_hash
    - data_4bytes_hash

seed: 42
