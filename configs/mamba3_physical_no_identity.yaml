# Mamba-3 physical — identity ablation

model:
  name: mamba3_physical
  family: neural
  input_view: sequence
  drop_categorical: true   # zeros categorical embedding output; x.shape preserved at 51-d
  d_input: 51
  d_model: 256
  d_state: 128
  expand: 2
  headdim: 64
  n_layers: 6
  nheads: 8
  seq_len: 1024

adapter:
  use_physical_delta: true
  granularity: per_head_per_layer
  init_a: 1.0
  init_b: calibrate
  clip_min: 0.001
  clip_max: 300.0
  total_params: 96

embeddings:
  from_addr:  { n_bins: 131072, dim: 16 }
  to_addr:    { n_bins: 131072, dim: 16 }
  data_4bytes: { n_bins: 16384,  dim: 8  }

input_proj:
  in_features: 51
  out_features: 256
  norm: layernorm

heads:
  revert:  { out: 1, activation: sigmoid }
  mev:     { out: 1, activation: sigmoid }
  drop:    { out: 1, activation: sigmoid }

training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 0.01
  schedule: cosine
  warmup_fraction: 0.05
  epochs: 5
  batch_size: 32
  seq_len: 1024
  warmup_tokens: 64
  gradient_clip_val: 1.0

loss:
  revert:  { type: weighted_bce, pos_weight: 10.0, weight: 1.0 }
  mev:     { type: focal, gamma: 2.0, alpha: 0.95, weight: 2.0 }
  drop:    { type: bce, weight: 0.5 }

sampling:
  mev_positive_prob: 0.3

checkpoint:
  save_every_epoch: true
  save_optimizer: true
  save_lr_scheduler: true

seed: 42
